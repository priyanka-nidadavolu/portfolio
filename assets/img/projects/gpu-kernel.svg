<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/><stop offset="100%" style="stop-color:#10101f"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="15" cy="15" r="1" fill="#f97316" opacity="0.06"/></pattern>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <radialGradient id="cg" cx="0%" cy="0%" r="60%">
    <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1"/>
    <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="600" fill="url(#cg)"/>
  <rect x="0" y="0" width="1200" height="3" fill="#f97316" opacity="0.8"/>
  <text x="50" y="44" font-family="monospace" font-size="11" letter-spacing="0.14em" fill="#f97316" opacity="0.9">ML SYSTEMS · GPU KERNELS · DISTRIBUTED TRAINING</text>
  <text x="36" y="88" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#ffffff" opacity="0.95">GPU Kernel Optimization + Distributed Training</text>
  
  <!-- Fused kernel left panel -->
  <rect x="36" y="115" width="520" height="320" rx="12" fill="#ffffff06" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  <text x="56" y="140" font-family="monospace" font-size="9" fill="#f97316" letter-spacing="0.1em">TRITON GPU KERNEL: D = ReLU(A x B + C)</text>
  <!-- GPU grid of blocks -->
  <g>
    <text x="56" y="165" font-family="monospace" font-size="9" fill="#ffffff35">Thread blocks (tile-parallel)</text>
    <g fill="#f97316" opacity="0.7">
      <rect x="56" y="172" width="44" height="32" rx="4"/><rect x="108" y="172" width="44" height="32" rx="4" opacity="0.85"/>
      <rect x="160" y="172" width="44" height="32" rx="4" opacity="0.7"/><rect x="212" y="172" width="44" height="32" rx="4" opacity="0.55"/>
      <rect x="56" y="212" width="44" height="32" rx="4" opacity="0.6"/><rect x="108" y="212" width="44" height="32" rx="4" opacity="0.75"/>
      <rect x="160" y="212" width="44" height="32" rx="4" opacity="0.5"/><rect x="212" y="212" width="44" height="32" rx="4" opacity="0.65"/>
    </g>
    <!-- memory hierarchy -->
    <rect x="56" y="262" width="480" height="24" rx="6" fill="#ffffff0a" stroke="#ffffff15"/>
    <text x="296" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff44">Global Memory (DRAM)</text>
    <rect x="56" y="294" width="220" height="24" rx="6" fill="#f9731620" stroke="#f9731660"/>
    <text x="166" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#f97316">Shared Memory (SRAM)</text>
    <rect x="285" y="294" width="150" height="24" rx="6" fill="#ffd58018" stroke="#ffd58050"/>
    <text x="360" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#fde68a">Registers</text>
    <!-- fused ops -->
    <text x="56" y="340" font-family="monospace" font-size="9" fill="#ffffff35" letter-spacing="0.06em">OPERATOR FUSION (no intermediate writes):</text>
    <g font-family="monospace" font-size="11">
      <text x="56" y="362" fill="#f97316">MatMul</text>
      <text x="130" y="362" fill="#ffffff30"> &#x2192; </text>
      <text x="158" y="362" fill="#f97316">Add</text>
      <text x="194" y="362" fill="#ffffff30"> &#x2192; </text>
      <text x="222" y="362" fill="#f97316">ReLU</text>
      <text x="270" y="362" fill="#22c55e">  fused in one kernel</text>
    </g>
    <!-- perf -->
    <rect x="56" y="378" width="480" height="40" rx="8" fill="#f9731610" stroke="#f9731630"/>
    <g font-family="monospace" font-size="10" text-anchor="middle">
      <text x="180" y="395" fill="#ffffff55">Speedup target</text><text x="180" y="410" fill="#f97316">&#x2265;1.25&#xD7; PyTorch</text>
      <text x="360" y="395" fill="#ffffff55">Optimization</text><text x="360" y="410" fill="#f97316">grid search (BLOCK_M/N/K)</text>
    </g>
  </g>
  <!-- Distributed training right panel -->
  <rect x="580" y="115" width="590" height="320" rx="12" fill="#ffffff05" stroke="#f97316" stroke-width="1" opacity="0.3"/>
  <text x="600" y="140" font-family="monospace" font-size="9" fill="#f97316" letter-spacing="0.1em">DISTRIBUTED TRANSFORMER TRAINING (MPI)</text>
  <!-- 2D parallelism grid -->
  <text x="600" y="162" font-family="monospace" font-size="9" fill="#ffffff35">2D Parallelism: DP x MP</text>
  <g font-family="monospace" font-size="9" text-anchor="middle">
    <!-- DP groups (rows) -->
    <rect x="600" y="170" width="110" height="36" rx="6" fill="#f9731628" stroke="#f9731666"/>
    <text x="655" y="188" fill="#f97316">Node 0</text><text x="655" y="202" fill="#ffffff44">model shard 0</text>
    <rect x="722" y="170" width="110" height="36" rx="6" fill="#f9731620" stroke="#f9731655"/>
    <text x="777" y="188" fill="#f97316">Node 1</text><text x="777" y="202" fill="#ffffff44">model shard 1</text>
    <rect x="844" y="170" width="110" height="36" rx="6" fill="#f9731618" stroke="#f9731644"/>
    <text x="899" y="188" fill="#f97316">Node 2</text><text x="899" y="202" fill="#ffffff44">model shard 0</text>
    <rect x="966" y="170" width="110" height="36" rx="6" fill="#f9731615" stroke="#f9731440"/>
    <text x="1021" y="188" fill="#f97316">Node 3</text><text x="1021" y="202" fill="#ffffff44">model shard 1</text>
    <!-- labels -->
    <text x="750" y="222" fill="#ffffff30">&#x2190;&#x2014;&#x2014; Model Parallel &#x2014;&#x2014;&#x2192;</text>
    <text x="750" y="238" fill="#ffffff25">&#x2193; Data Parallel (same model, diff data)</text>
    <rect x="600" y="244" width="110" height="36" rx="6" fill="#f9731612" stroke="#f9731435"/>
    <text x="655" y="262" fill="#f97316">Node 4</text><text x="655" y="276" fill="#ffffff35">model shard 0</text>
    <rect x="722" y="244" width="110" height="36" rx="6" fill="#f9731610" stroke="#f9731430"/>
    <text x="777" y="262" fill="#f97316">Node 5</text><text x="777" y="276" fill="#ffffff35">model shard 1</text>
  </g>
  <!-- Collectives -->
  <text x="600" y="302" font-family="monospace" font-size="9" fill="#ffffff35" letter-spacing="0.06em">COLLECTIVE COMMUNICATION:</text>
  <g font-family="monospace" font-size="10">
    <rect x="600" y="310" width="120" height="26" rx="6" fill="#f9731618" stroke="#f9731440"/>
    <text x="660" y="327" text-anchor="middle" fill="#f97316">AllReduce</text>
    <rect x="730" y="310" width="120" height="26" rx="6" fill="#f9731614" stroke="#f9731435"/>
    <text x="790" y="327" text-anchor="middle" fill="#f97316">AllToAll</text>
    <rect x="860" y="310" width="150" height="26" rx="6" fill="#f9731610" stroke="#f9731430"/>
    <text x="935" y="327" text-anchor="middle" fill="#f97316">Reduce-Scatter</text>
    <text x="600" y="358" fill="#ffffff35">Tensor sharding: fc_q/k/v split on output dim, fc_o on input dim</text>
    <text x="600" y="376" fill="#ffffff25">Custom MPI vs native MPI benchmarked — hardware-aware ring algs faster</text>
    <text x="600" y="394" fill="#22c55e88">Built fused kernel &#x2265;1.25&#xD7; PyTorch baseline</text>
    <text x="600" y="412" fill="#22c55e66">Implemented AllReduce + AllToAll + Reduce-Scatter from scratch</text>
    <text x="600" y="430" fill="#22c55e55">Full forward + backward communication pipeline for tensor parallelism</text>
  </g>
  <!-- Bottom stats strip -->
  <rect x="36" y="455" width="1124" height="75" rx="12" fill="#ffffff06" stroke="#f97316" stroke-width="1" opacity="0.2"/>
  <g font-family="monospace" text-anchor="middle">
    <text x="180" y="480" font-size="9" fill="#ffffff35">KERNEL SPEEDUP</text>
    <text x="180" y="505" font-family="Georgia,serif" font-size="24" font-weight="bold" fill="#f97316">&#x2265;1.25&#xD7;</text>
    <text x="420" y="480" font-size="9" fill="#ffffff35">PARALLELISM</text>
    <text x="420" y="505" font-size="13" fill="white">DP &#xD7; MP (2D)</text>
    <text x="660" y="480" font-size="9" fill="#ffffff35">COLLECTIVES</text>
    <text x="660" y="505" font-size="13" fill="white">AllReduce · AllToAll</text>
    <text x="900" y="480" font-size="9" fill="#ffffff35">OPERATIONS FUSED</text>
    <text x="900" y="505" font-size="13" fill="white">MatMul + Add + ReLU</text>
    <text x="1100" y="480" font-size="9" fill="#ffffff35">FRAMEWORK</text>
    <text x="1100" y="505" font-size="13" fill="white">Triton + MPI</text>
  </g>
  <rect x="0" y="548" width="1200" height="52" fill="#ffffff04" stroke="#ffffff08" stroke-width="1"/>
  <text x="36" y="578" font-family="monospace" font-size="11" letter-spacing="0.1em" fill="#f97316" opacity="0.7">TRITON · CUDA · MPI (mpi4py) · NUMPY · PYTHON · PYTORCH TENSORS</text>
</svg>