  <text x="72" y="334" font-family="monospace" font-size="9" fill="#ffffff25">Great service, very responsive team. Would definitely recommend...</text>
  <!-- Share link -->
  <rect x="56" y="374" width="390" height="30" rx="6" fill="#7c3aed15" stroke="#7c3aed40"/>
  <text x="72" y="393" font-family="monospace" font-size="10" fill="#a78bfa">survey.app/s/abc123xyz7</text>
  <rect x="460" y="374" width="80" height="30" rx="6" fill="#7c3aed" opacity="0.85"/>
