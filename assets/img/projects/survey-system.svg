  <!-- Form content -->
  <text x="56" y="184" font-family="Georgia,serif" font-size="15" fill="white" font-weight="bold">Customer Satisfaction Survey</text>
  <text x="56" y="206" font-family="monospace" font-size="10" fill="#ffffff44">Q1. How satisfied are you with our service?</text>
  <g fill="#7c3aed" opacity="0.8"><rect x="56" y="214" width="12" height="12" rx="3"/></g>
  <text x="76" y="225" font-family="monospace" font-size="10" fill="#ffffff77">&#x25CF; Very Satisfied</text>
  <rect x="56" y="234" width="12" height="12" rx="3" fill="none" stroke="#ffffff25"/>
  <text x="76" y="245" font-family="monospace" font-size="10" fill="#ffffff40">&#x25CB; Satisfied</text>
  <rect x="56" y="254" width="12" height="12" rx="3" fill="none" stroke="#ffffff25"/>
  <text x="76" y="265" font-family="monospace" font-size="10" fill="#ffffff40">&#x25CB; Neutral</text>
  <text x="56" y="296" font-family="monospace" font-size="10" fill="#ffffff44">Q2. Share any additional feedback:</text>
