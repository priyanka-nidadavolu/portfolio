  <circle cx="960" cy="260" r="70" fill="none" stroke="#7c3aed" stroke-width="28" stroke-dasharray="264 440"/>
  <circle cx="960" cy="260" r="70" fill="none" stroke="#a78bfa" stroke-width="28" stroke-dasharray="110 440" stroke-dashoffset="-264"/>
  <circle cx="960" cy="260" r="70" fill="none" stroke="#ffffff18" stroke-width="28" stroke-dasharray="66 440" stroke-dashoffset="-374"/>
  <text x="960" y="254" text-anchor="middle" font-family="Georgia,serif" font-size="24" font-weight="bold" fill="white">248</text>
  <text x="960" y="274" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff55">responses</text>
  <g font-family="monospace" font-size="10">
    <rect x="800" y="350" width="12" height="12" rx="3" fill="#7c3aed"/>
    <text x="820" y="361" fill="#ffffff66">Very Satisfied 60%</text>
    <rect x="800" y="374" width="12" height="12" rx="3" fill="#a78bfa"/>
    <text x="820" y="385" fill="#ffffff66">Satisfied 25%</text>
    <rect x="800" y="398" width="12" height="12" rx="3" fill="#ffffff18"/>
    <text x="820" y="409" fill="#ffffff44">Other 15%</text>
  </g>
  <!-- Module strip -->
  <rect x="36" y="448" width="1124" height="52" rx="10" fill="#ffffff06" stroke="#ffffff0c"/>
  <g font-family="monospace" font-size="10" fill="#ffffff50" text-anchor="middle">
    <text x="120" y="478">User Auth</text>
    <text x="296" y="478">Templates</text>
    <text x="472" y="478">Form Builder</text>
    <text x="648" y="478">Share Links</text>
    <text x="824" y="478">Responses</text>
    <text x="1000" y="478">Analytics</text>
    <text x="1110" y="478">Export</text>
  </g>
  <g stroke="#ffffff10" stroke-width="1">
    <line x1="200" y1="448" x2="200" y2="500"/><line x1="384" y1="448" x2="384" y2="500"/>
    <line x1="560" y1="448" x2="560" y2="500"/><line x1="736" y1="448" x2="736" y2="500"/>
    <line x1="912" y1="448" x2="912" y2="500"/><line x1="1056" y1="448" x2="1056" y2="500"/>
