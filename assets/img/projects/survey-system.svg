  <rect x="0" y="548" width="1200" height="52" fill="#ffffff04" stroke="#ffffff08" stroke-width="1"/>
  <text x="36" y="578" font-family="monospace" font-size="11" letter-spacing="0.1em" fill="#7c3aed" opacity="0.7">JAVA &#xB7; JSP &#xB7; JAVA SERVLETS &#xB7; MYSQL &#xB7; HTML/CSS/JS &#xB7; CHART.JS</text>
