  <rect x="556" y="374" width="140" height="30" rx="6" fill="#ffffff08" stroke="#ffffff15"/>
  <text x="626" y="393" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff55">Email &#xB7; Slack &#xB7; Social</text>
