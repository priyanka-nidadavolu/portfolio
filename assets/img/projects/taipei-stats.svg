<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#10101f"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#fa687e" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <!-- Accent corner glow -->
  <radialGradient id="cornerglow" cx="0%" cy="0%" r="60%">
    <stop offset="0%" style="stop-color:#fa687e;stop-opacity:0.12"/>
    <stop offset="100%" style="stop-color:#fa687e;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="600" fill="url(#cornerglow)"/>
  <!-- Top label strip -->
  <rect x="0" y="0" width="1200" height="3" fill="#fa687e" opacity="0.8"/>
  <!-- Project label pill -->
  <rect x="36" y="28" width="auto" height="24" rx="12" fill="#fa687e22" stroke="#fa687e55" stroke-width="1"/>
  <text x="50" y="44" font-family="'DM Mono',monospace" font-size="11" letter-spacing="0.14em" fill="#fa687e" opacity="0.9">STATISTICAL MODELING</text>
  <!-- Title -->
  <text x="36" y="88" font-family="'Fraunces',Georgia,serif" font-size="34" font-weight="700" fill="#ffffff" opacity="0.95">Taipei House Price Modeling</text>
  <!-- Main visual area -->
  
  <!-- Chart box -->
  <rect x="36" y="120" width="680" height="400" rx="12" fill="#ffffff04" stroke="#ffffff0c"/>
  <!-- Grid -->
  <g stroke="#ffffff07" stroke-width="1">
    <line x1="36" y1="200" x2="716" y2="200"/><line x1="36" y1="280" x2="716" y2="280"/>
    <line x1="36" y1="360" x2="716" y2="360"/><line x1="36" y1="440" x2="716" y2="440"/>
    <line x1="180" y1="120" x2="180" y2="520"/><line x1="320" y1="120" x2="320" y2="520"/>
    <line x1="460" y1="120" x2="460" y2="520"/><line x1="600" y1="120" x2="600" y2="520"/>
  </g>
  <!-- Scatter points -->
  <g fill="#fa687e" opacity="0.55">
    <circle cx="90" cy="175" r="4.5"/><circle cx="115" cy="195" r="4.5"/>
    <circle cx="150" cy="215" r="4.5"/><circle cx="195" cy="230" r="4.5"/>
    <circle cx="245" cy="248" r="4.5"/><circle cx="295" cy="262" r="4.5"/>
    <circle cx="345" cy="278" r="4.5"/><circle cx="400" cy="295" r="4.5"/>
    <circle cx="450" cy="308" r="4.5"/><circle cx="495" cy="325" r="4.5"/>
    <circle cx="540" cy="340" r="4.5"/><circle cx="585" cy="355" r="4.5"/>
    <circle cx="630" cy="370" r="4.5"/><circle cx="670" cy="384" r="4.5"/>
    <!-- Extra scatter -->
    <circle cx="130" cy="160" r="4.5" opacity="0.35"/><circle cx="210" cy="212" r="4.5" opacity="0.35"/>
    <circle cx="310" cy="238" r="4.5" opacity="0.35"/><circle cx="420" cy="270" r="4.5" opacity="0.35"/>
    <circle cx="510" cy="298" r="4.5" opacity="0.35"/><circle cx="610" cy="345" r="4.5" opacity="0.35"/>
    <circle cx="170" cy="188" r="4.5" opacity="0.4"/><circle cx="370" cy="260" r="4.5" opacity="0.4"/>
    <circle cx="560" cy="320" r="4.5" opacity="0.4"/><circle cx="680" cy="400" r="4.5" opacity="0.35"/>
  </g>
  <!-- Regression line -->
  <line x1="70" y1="155" x2="700" y2="410" stroke="#ffffff" stroke-width="2" opacity="0.85"/>
  <!-- CI band -->
  <polygon points="70,135 700,388 700,432 70,175" fill="#ffffff" opacity="0.05"/>
  <!-- Annotation -->
  <line x1="430" y1="298" x2="510" y2="235" stroke="#fa687e" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.8"/>
  <rect x="510" y="200" width="185" height="60" rx="8" fill="#fa687e" opacity="0.85"/>
  <text x="603" y="223" text-anchor="middle" font-family="monospace" font-size="11" fill="white">β(MRT) = −0.31</text>
  <text x="603" y="242" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffff99">95% CI [−0.38, −0.24]</text>
  <text x="603" y="254" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff77">p &lt; 0.001</text>
  <!-- Axis labels -->
  <text x="376" y="545" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffff30">log(Distance to MRT)</text>
  <!-- Right stats panel -->
  <rect x="760" y="120" width="400" height="400" rx="12" fill="#ffffff04" stroke="#ffffff0c"/>
  <text x="960" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffff44" letter-spacing="0.1em">MODEL RESULTS</text>
  <!-- R2 big -->
  <text x="820" y="230" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#fa687e" opacity="0.9">0.58</text>
  <text x="820" y="262" font-family="monospace" font-size="10" fill="#ffffff44">Cross-validated R²</text>
  <line x1="780" y1="285" x2="1140" y2="285" stroke="#ffffff0c"/>
  <!-- Predictor bars -->
  <text x="780" y="314" font-family="monospace" font-size="9" fill="#ffffff44">KEY PREDICTORS</text>
  <text x="780" y="348" font-family="monospace" font-size="11" fill="#ffffff77">MRT distance</text>
  <rect x="780" y="354" width="260" height="10" rx="5" fill="#fa687e" opacity="0.8"/>
  <text x="1048" y="363" font-family="monospace" font-size="10" fill="#fa687e">−0.31</text>
  <text x="780" y="390" font-family="monospace" font-size="11" fill="#ffffff77">Nearby stores</text>
  <rect x="780" y="396" width="140" height="10" rx="5" fill="#7ec8a4" opacity="0.8"/>
  <text x="928" y="405" font-family="monospace" font-size="10" fill="#7ec8a4">+1.1</text>
  <text x="780" y="432" font-family="monospace" font-size="11" fill="#ffffff77">House age</text>
  <rect x="780" y="438" width="170" height="10" rx="5" fill="#fa687e" opacity="0.5"/>
  <text x="958" y="447" font-family="monospace" font-size="10" fill="#fa687e77">−0.27</text>
  <text x="780" y="488" font-family="monospace" font-size="10" fill="#ffffff44">Bootstrap n=1,000 · LASSO · 10-fold CV</text>
  <!-- Tech strip at bottom -->
  <rect x="0" y="548" width="1200" height="52" fill="#ffffff04" stroke="#ffffff08" stroke-width="1"/>
  <text x="36" y="578" font-family="'DM Mono',monospace" font-size="11" letter-spacing="0.1em" fill="#fa687e" opacity="0.7">PYTHON · LASSO · STATSMODELS · BOOTSTRAP · SCIKIT-LEARN</text>
</svg>