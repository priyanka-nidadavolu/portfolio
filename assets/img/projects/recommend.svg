    <circle cx="36" cy="130" r="8" fill="#fa687e"/><text x="52" y="135" font-family="monospace" font-size="10" fill="#fa687e">Trusted</text>
    <circle cx="36" cy="155" r="8" fill="#ffd580"/><text x="52" y="160" font-family="monospace" font-size="10" fill="#ffd580">2nd-hop</text>
