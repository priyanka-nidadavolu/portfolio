  <text x="36" y="578" font-family="'DM Mono',monospace" font-size="11" letter-spacing="0.1em" fill="#fa687e" opacity="0.7">PYTHON · MARKOV RANDOM FIELD · SCIKIT-LEARN · EPINIONS · HUGGING FACE</text>
