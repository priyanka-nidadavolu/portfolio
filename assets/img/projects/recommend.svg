    <line x1="300" y1="210" x2="200" y2="340"/><line x1="500" y1="165" x2="660" y2="245"/>
    <line x1="500" y1="165" x2="420" y2="330"/><line x1="420" y1="330" x2="560" y2="415"/>
    <line x1="420" y1="330" x2="660" y2="245"/><line x1="660" y1="245" x2="770" y2="165"/>
    <line x1="660" y1="245" x2="810" y2="345"/><line x1="770" y1="165" x2="910" y2="205"/>
    <line x1="200" y1="340" x2="290" y2="450"/><line x1="560" y1="415" x2="700" y2="465"/>
    <line x1="810" y1="345" x2="700" y2="465"/><line x1="810" y1="345" x2="960" y2="385"/>
    <line x1="910" y1="205" x2="1010" y2="285"/><line x1="1010" y1="285" x2="960" y2="385"/>
