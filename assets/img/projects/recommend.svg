    <text x="1048" y="218">★★★★☆</text><text x="1048" y="236">Product B</text>
    <line x1="1048" y1="244" x2="1152" y2="244" stroke="#ffffff10"/>
    <text x="1048" y="262">★★★★☆</text><text x="1048" y="280">Product C</text>
    <line x1="1048" y1="288" x2="1152" y2="288" stroke="#ffffff10"/>
    <text x="1048" y="306">★★★☆☆</text>
  </g>
