<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#10101f"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#fa687e" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <!-- Accent corner glow -->
  <radialGradient id="cornerglow" cx="0%" cy="0%" r="60%">
    <stop offset="0%" style="stop-color:#fa687e;stop-opacity:0.12"/>
    <stop offset="100%" style="stop-color:#fa687e;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="600" fill="url(#cornerglow)"/>
  <!-- Top label strip -->
  <rect x="0" y="0" width="1200" height="3" fill="#fa687e" opacity="0.8"/>
  <!-- Project label pill -->
  <rect x="36" y="28" width="auto" height="24" rx="12" fill="#fa687e22" stroke="#fa687e55" stroke-width="1"/>
