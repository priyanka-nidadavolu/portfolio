  <text x="36" y="88" font-family="'Fraunces',Georgia,serif" font-size="34" font-weight="700" fill="#ffffff" opacity="0.95">Socially-Aware Recommendation</text>
  <!-- Main visual area -->
  
  <!-- Trust network -->
