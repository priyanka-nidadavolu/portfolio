<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#10101f"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#fa687e" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <!-- Accent corner glow -->
  <radialGradient id="cornerglow" cx="0%" cy="0%" r="60%">
    <stop offset="0%" style="stop-color:#fa687e;stop-opacity:0.12"/>
    <stop offset="100%" style="stop-color:#fa687e;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="600" fill="url(#cornerglow)"/>
  <!-- Top label strip -->
  <rect x="0" y="0" width="1200" height="3" fill="#fa687e" opacity="0.8"/>
  <!-- Project label pill -->
  <rect x="36" y="28" width="auto" height="24" rx="12" fill="#fa687e22" stroke="#fa687e55" stroke-width="1"/>
  <text x="50" y="44" font-family="'DM Mono',monospace" font-size="11" letter-spacing="0.14em" fill="#fa687e" opacity="0.9">HEALTHCARE · AI</text>
  <!-- Title -->
  <text x="36" y="88" font-family="'Fraunces',Georgia,serif" font-size="34" font-weight="700" fill="#ffffff" opacity="0.95">MediDB: Drug Safety System</text>
  <!-- Main visual area -->
  
  <!-- 4 DB nodes with connections to center -->
  <!-- PostgreSQL -->
  <rect x="70" y="160" width="160" height="90" rx="14" fill="#336791" opacity="0.8"/>
  <text x="150" y="195" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">PostgreSQL</text>
  <text x="150" y="215" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffffaa">Patient EHR</text>
  <text x="150" y="232" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff66">Synthea · normalised schema</text>
  <!-- Neo4j -->
  <rect x="70" y="330" width="160" height="90" rx="14" fill="#018bff" opacity="0.75"/>
  <text x="150" y="365" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">Neo4j</text>
  <text x="150" y="385" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffffaa">Drug Interactions</text>
  <text x="150" y="402" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff66">DrugBank · SIDER · Cypher</text>
  <!-- Qdrant -->
  <rect x="970" y="160" width="160" height="90" rx="14" fill="#b7215a" opacity="0.85"/>
  <text x="1050" y="195" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">Qdrant</text>
  <text x="1050" y="215" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffffaa">Vector Search</text>
  <text x="1050" y="232" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff66">BioLORD-2023 embeddings</text>
  <!-- MongoDB -->
  <rect x="970" y="330" width="160" height="90" rx="14" fill="#2e7d32" opacity="0.85"/>
  <text x="1050" y="365" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">MongoDB</text>
  <text x="1050" y="385" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffffaa">FAERS Reports</text>
  <text x="1050" y="402" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff66">Raw + audit logs</text>
  <!-- Center orchestration -->
  <circle cx="600" cy="295" r="72" fill="#fa687e18" stroke="#fa687e" stroke-width="1.8"/>
  <circle cx="600" cy="295" r="46" fill="#fa687e1a" stroke="#fa687e66" stroke-width="1"/>
  <text x="600" y="287" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="white">Orchestration</text>
  <text x="600" y="306" text-anchor="middle" font-family="monospace" font-size="10" fill="#fa687e">Safety Report</text>
  <!-- Connector lines -->
  <g stroke="#fa687e" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.5">
    <path d="M 230 200 Q 410 220 532 268"/><path d="M 230 375 Q 410 355 532 315"/>
    <path d="M 970 200 Q 790 220 668 268"/><path d="M 970 375 Q 790 355 668 315"/>
  </g>
  <!-- Flow dots -->
  <g fill="#fa687e" filter="url(#glow)">
    <circle cx="370" cy="232" r="4.5"/><circle cx="460" cy="255" r="3.5"/>
    <circle cx="370" cy="348" r="4.5"/><circle cx="460" cy="330" r="3.5"/>
    <circle cx="830" cy="232" r="4.5"/><circle cx="740" cy="255" r="3.5"/>
    <circle cx="830" cy="348" r="4.5"/><circle cx="740" cy="330" r="3.5"/>
  </g>
  <!-- Streamlit bar at bottom -->
  <rect x="440" y="430" width="320" height="56" rx="12" fill="#ffffff08" stroke="#fa687e30"/>
  <text x="600" y="455" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffd580">[ Streamlit Clinical UI ]</text>
  <text x="600" y="474" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff44">Safety Check · Drug KB · Evidence Audit</text>
  <path d="M600 367 L600 430" stroke="#fa687e44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Tech strip at bottom -->
  <rect x="0" y="548" width="1200" height="52" fill="#ffffff04" stroke="#ffffff08" stroke-width="1"/>
  <text x="36" y="578" font-family="'DM Mono',monospace" font-size="11" letter-spacing="0.1em" fill="#fa687e" opacity="0.7">PYTHON · POSTGRESQL · NEO4J · QDRANT · MONGODB · STREAMLIT</text>
</svg>