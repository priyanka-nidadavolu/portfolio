<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/><stop offset="100%" style="stop-color:#10101f"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#fa687e" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <radialGradient id="cg" cx="0%" cy="0%" r="60%">
    <stop offset="0%" style="stop-color:#fa687e;stop-opacity:0.1"/>
    <stop offset="100%" style="stop-color:#fa687e;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="600" fill="url(#cg)"/>
  <rect x="0" y="0" width="1200" height="3" fill="#fa687e" opacity="0.8"/>
  <text x="50" y="44" font-family="'DM Mono',monospace" font-size="11" letter-spacing="0.14em" fill="#fa687e" opacity="0.9">DATA ANALYSIS · TABLEAU</text>
  <text x="36" y="88" font-family="'Fraunces',Georgia,serif" font-size="34" font-weight="700" fill="#ffffff" opacity="0.95">Customer Response Analysis</text>
  
  <!-- KPI strip -->
  <g>
    <rect x="36" y="120" width="220" height="66" rx="10" fill="#ffffff06" stroke="#ffffff0c"/>
    <text x="146" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff35">TOTAL RECORDS</text>
    <text x="146" y="173" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="white">41K+</text>
    <rect x="272" y="120" width="220" height="66" rx="10" fill="#fa687e10" stroke="#fa687e25"/>
    <text x="382" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff35">SUBSCRIBED</text>
    <text x="382" y="173" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#fa687e">11.7%</text>
    <rect x="508" y="120" width="220" height="66" rx="10" fill="#fa687e10" stroke="#fa687e25"/>
    <text x="618" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff35">TOP SEGMENT</text>
    <text x="618" y="168" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="white">Retired</text>
    <text x="618" y="183" text-anchor="middle" font-family="monospace" font-size="10" fill="#fa687e">2.8× avg rate</text>
    <rect x="744" y="120" width="200" height="66" rx="10" fill="#7ec8a410" stroke="#7ec8a425"/>
    <text x="844" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff35">EFFICIENCY GAIN</text>
    <text x="844" y="173" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#7ec8a4">+12%</text>
    <rect x="960" y="120" width="200" height="66" rx="10" fill="#ffffff06" stroke="#ffffff0c"/>
    <text x="1060" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff35">BEST PERIOD</text>
    <text x="1060" y="173" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="white">May–Aug</text>
