  <g>
    <text x="120" y="268" text-anchor="end" font-family="monospace" font-size="9" fill="#ffffff55">Retired</text>
    <rect x="128" y="258" width="280" height="14" rx="4" fill="#fa687e" opacity="0.9"/>
    <text x="415" y="270" font-family="monospace" font-size="9" fill="#fa687e">34%</text>
